<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
<main class="todo-card">
<h1>Your To Do</h1>
<!-- this one is for the form start -->
 <section class="add-task">
     <input 
     type="text"
     id="task-input"
     placeholder="add new task"
     aria-label="Add new task"
     >
     <button id="the-add-task-btn" type="button">Add</button>
 </section>
  <section class="task-list-wrapper">
    <h2>Task Lists</h2>
    <ul class="task-list">
    <li class= "T-item" data-id="1" >
        <input  type="checkbox"   class="task-check" >
        <span class="task-text">Read for an hour #1</span>
        <button class="delete-btn" type="button" aria-label="Delete task">x</button>
    </li>
    <li class= "T-item" data-id="2" >
        <input  type="checkbox"   class="task-check" >
        <span class="task-text">Fixing the chair #2</span>
        <button class="delete-btn" type="button" aria-label="Delete task">x</button>
    </li>
    <li class= "T-item" data-id="3" >
        <input  type="checkbox"   class="task-check" >
        <span class="task-text">Going to the market#3</span>
        <button class="delete-btn" type="button" aria-label="Delete task">x</button>
    </li>
    <li class= "T-item" data-id="4" >
        <input  type="checkbox"   class="task-check" >
        <span class="task-text">Go to the gym for 2 hours #4</span>
        <button class="delete-btn" type="button" aria-label="Delete task">x</button>
    </li>
    </ul>                                                            
  </section>
  <!-- the inspiration -->
   <aside class="quote-box">
    <h2 class="quote">Motivational Quote</h2>
    <p id="quote">"All we have to decide is what to do with the time that is given us"</p>
   
</aside>
</main>
<script src="script.js"></script>
</body>
</html>
